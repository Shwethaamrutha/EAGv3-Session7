<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RAG Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #a5b4fc; }
    .header .count { font-size: 11px; color: #64748b; }
    .pages-bar {
      padding: 8px 12px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .page-chip {
      padding: 4px 8px;
      background: #334155;
      border-radius: 12px;
      font-size: 10px;
      color: #94a3b8;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 90%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg.user { align-self: flex-end; background: #4f46e5; color: white; border-radius: 12px 12px 2px 12px; }
    .msg.bot { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-radius: 12px 12px 12px 2px; }
    .msg.bot .sources { margin-top: 8px; padding-top: 6px; border-top: 1px solid #334155; font-size: 11px; color: #64748b; }
    .msg.bot h1, .msg.bot h2, .msg.bot h3 { margin: 8px 0 4px; font-size: 14px; color: #a5b4fc; }
    .msg.bot ul, .msg.bot ol { margin: 4px 0; padding-left: 18px; }
    .msg.bot li { margin: 2px 0; }
    .msg.bot p { margin: 4px 0; }
    .msg.bot code { background: #334155; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .msg.bot strong { color: #e2e8f0; }
    .msg.bot table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
    .msg.bot th, .msg.bot td { border: 1px solid #334155; padding: 6px 10px; text-align: left; }
    .msg.bot th { background: #1e293b; color: #a5b4fc; font-weight: 600; }
    .msg.bot tr:nth-child(even) { background: rgba(51, 65, 85, 0.3); }
    .query-log-container { margin: 6px 0; padding: 8px; background: #0c1222; border-radius: 8px; border: 1px solid #1e3a5f; }
    .step-log { padding: 4px 12px; font-size: 11px; color: #64748b; font-family: monospace; border-left: 2px solid #334155; margin: 3px 0 3px 8px; }
    .step-log .step-name { color: #38bdf8; font-weight: 600; }
    .retrieval-log { background: #0c1222; border: 1px solid #1e3a5f; border-radius: 8px; padding: 10px 12px; margin: 6px 0; font-size: 11px; font-family: monospace; }
    .retrieval-log .log-header { color: #38bdf8; font-weight: 600; margin-bottom: 4px; }
    .retrieval-log .log-sources { color: #64748b; margin-bottom: 6px; }
    .retrieval-log .log-chunk { color: #94a3b8; padding: 3px 0; border-top: 1px solid #1e293b; }
    .retrieval-log .log-src { color: #a78bfa; }
    .input-area {
      padding: 12px;
      border-top: 1px solid #334155;
      background: #1e293b;
    }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    .input-row input:focus { border-color: #4f46e5; }
    .input-row button {
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .input-row button:hover { background: #4338ca; }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; color: #64748b; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>RAG Assistant</h1>
    <span class="count" id="page-count">0 pages indexed</span>
  </div>
  <div class="pages-bar" id="pages-bar"></div>
  <div class="chat" id="chat">
    <div class="empty-state">Click the <b>+</b> button on any page to add it to your knowledge base, then ask questions here.</div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input id="input" placeholder="Ask across your indexed pages..." />
      <button id="send">Ask</button>
    </div>
  </div>
  <script src="marked.min.js"></script>
  <link rel="stylesheet" href="katex.min.css">
  <script src="katex.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
